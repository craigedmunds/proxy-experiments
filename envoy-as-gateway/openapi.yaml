openapi: "3.0.3"
info:
  title: Pet Store API
  description: A simple mock API for demonstrating Envoy gateway features
  version: "1.0.0"
servers:
  - url: http://localhost:8080
    description: Via Envoy gateway
paths:
  /pets:
    get:
      operationId: listPets
      summary: List all pets
      responses:
        "200":
          description: A list of pets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pet"
              example:
                - id: 1
                  name: "Fido"
                  species: "dog"
                  age: 3
                - id: 2
                  name: "Whiskers"
                  species: "cat"
                  age: 5
                - id: 3
                  name: "Bubbles"
                  species: "fish"
                  age: 1
    post:
      operationId: createPet
      summary: Create a pet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PetInput"
      responses:
        "201":
          description: Pet created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
              example:
                id: 4
                name: "Rex"
                species: "dog"
                age: 2
  /pets/{petId}:
    get:
      operationId: getPet
      summary: Get a pet by ID
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: A single pet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
              example:
                id: 1
                name: "Fido"
                species: "dog"
                age: 3
        "404":
          description: Pet not found
          content:
            application/json:
              example:
                error: "Pet not found"
    delete:
      operationId: deletePet
      summary: Delete a pet
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Pet deleted
  /pets/{petId}/vaccinations:
    get:
      operationId: listVaccinations
      summary: List vaccinations for a pet
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Vaccination records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Vaccination"
              example:
                - id: 1
                  name: "Rabies"
                  date: "2024-01-15"
                  vetName: "Dr. Smith"
                - id: 2
                  name: "Distemper"
                  date: "2024-03-20"
                  vetName: "Dr. Jones"
  /health:
    get:
      operationId: healthCheck
      summary: Health check endpoint
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              example:
                status: "healthy"
                timestamp: "2024-01-01T00:00:00Z"
components:
  schemas:
    Pet:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        species:
          type: string
        age:
          type: integer
      required: [id, name, species, age]
    PetInput:
      type: object
      properties:
        name:
          type: string
        species:
          type: string
        age:
          type: integer
      required: [name, species, age]
    Vaccination:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        date:
          type: string
          format: date
        vetName:
          type: string
      required: [id, name, date, vetName]
