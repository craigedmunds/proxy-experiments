services:
  # --- Config generator (runs first, produces envoy.yaml + ratelimit config) ---
  generator:
    build: ./generator
    volumes:
      - ./paths.yaml:/input/paths.yaml:ro
      - generated-envoy:/output/envoy
      - generated-ratelimit:/output/ratelimit

  # --- Mock API backend (serves OAS examples) ---
  app:
    build: ./app
    volumes:
      - ./oas.yaml:/app/openapi.yaml:ro
    networks: [gateway]

  # --- Redis for rate limit storage ---
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    networks: [gateway]

  # --- Rate limit service (envoyproxy/ratelimit) ---
  ratelimit:
    image: envoyproxy/ratelimit:master
    environment:
      - USE_STATSD=false
      - LOG_LEVEL=warn
      - REDIS_SOCKET_TYPE=tcp
      - REDIS_URL=redis:6379
      - RUNTIME_ROOT=/data
      - RUNTIME_SUBDIRECTORY=ratelimit
      - RUNTIME_IGNOREDOTFILES=true
      - DISABLE_STATS=true
    volumes:
      - generated-ratelimit:/data/ratelimit/config:ro
    depends_on:
      generator:
        condition: service_completed_successfully
      redis:
        condition: service_started
    networks: [gateway]

  # --- External auth service (validates Basic Auth OR Bearer, enforces scopes) ---
  authz:
    build: ./authz
    volumes:
      - ./paths.yaml:/app/paths.yaml:ro
    networks: [gateway]

  # --- Envoy gateway ---
  envoy:
    image: envoyproxy/envoy:v1.31-latest
    command: ["-c", "/etc/envoy/envoy.yaml", "--log-level", "info", "--file-flush-interval-msec", "0"]
    volumes:
      - generated-envoy:/etc/envoy:ro
    ports:
      - "8080:8080"
      - "9901:9901"
    depends_on:
      generator:
        condition: service_completed_successfully
      app:
        condition: service_started
      ratelimit:
        condition: service_started
      authz:
        condition: service_started
    networks: [gateway]
    tty: true

  # --- Test client (exercises auth & rate limits) ---
  test-client:
    build: ./test-client
    depends_on:
      envoy:
        condition: service_started
    networks: [gateway]

volumes:
  generated-envoy:
  generated-ratelimit:

networks:
  gateway: {}
